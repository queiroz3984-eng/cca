<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro de Músicos CCA</title>

<style>
body { font-family: Arial; background:#f4f4f4; padding:20px; margin-top: 60px; }
form, table { background:#fff; padding:15px; border-radius:8px; margin-bottom:20px; }
input, select { padding:8px; margin:5px; width:180px; }
button { padding:6px 10px; border:none; cursor:pointer; border-radius:5px; }
.plus-btn { width:auto; background:#0078D4; color:white; }
table { width:100%; border-collapse:collapse; }
th, td { padding:10px; border:1px solid #ccc; }
th { background:#0078D4; color:white; }
.logo-topo { position: absolute; top: 50px; right: 50px; width: 200px; }

/* Botões da tabela */
.btn-editar, .btn-excluir, .btn-whatsapp { 
  padding: 5px 8px; 
  font-size: 14px; 
  text-decoration: none; 
  display: inline-block; 
  border-radius: 4px;
}
.btn-whatsapp { background: #25D366; color: white; border: none; cursor: pointer; margin-right: 3px; }
.btn-whatsapp:hover { background: #128C7E; }

/* Botão de Envio em Lote */
.btn-whatsapp-lote { background: #25D366; color: white; font-weight: bold; padding: 10px 15px; border-radius: 5px; font-size: 14px; margin-bottom: 15px; display: inline-flex; align-items: center; gap: 8px; }
.btn-whatsapp-lote:hover { background: #128C7E; }

/* Container da busca e botão limpar */
.busca-container { display: flex; align-items: center; margin-bottom: 15px; gap: 5px; }
#busca { width:250px; padding:10px; margin: 0; }
.btn-limpar { background: #ccc; color: #333; font-weight: bold; padding: 10px 14px; border-radius: 5px; font-size: 14px; }
.btn-limpar:hover { background: #b5b5b5; }

/* Telas do Sistema */
#tela-login { max-width: 350px; margin: 100px auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); text-align: center; }
#tela-login input { width: 90%; display: block; margin: 10px auto; padding: 10px; }
#tela-login button { width: 96%; background: #0078D4; color: white; padding: 10px; font-weight: bold; margin-top: 10px; }
#conteudo-sistema { display: none; } /* Escondido por padrão */

/* Estilos comuns para Filtros de Múltipla Escolha (Dropdown Checkbox) */
.filtros { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 15px; }
.multiselect { width: 200px; position: relative; display: inline-block; font-size: 14px; vertical-align: middle; }
.selectBox { position: relative; }
.selectBox select { width: 100%; font-weight: normal; padding: 8px; margin: 0; }
.overSelect { position: absolute; left: 0; right: 0; top: 0; bottom: 0; cursor: pointer; }
.checkboxes-dropdown { display: none; border: 1px solid #ccc; border-top: none; position: absolute; background-color: #fff; width: 100%; z-index: 10; max-height: 250px; overflow-y: auto; box-shadow: 0px 4px 6px rgba(0,0,0,0.1); border-radius: 0 0 5px 5px; padding: 5px 0; }
.checkboxes-dropdown label { display: block; padding: 6px 12px; cursor: pointer; color: #333; text-align: left; }
.checkboxes-dropdown label:hover { background-color: #0078D4; color: white; }
.checkboxes-dropdown input { width: auto; margin-right: 10px; vertical-align: middle; }

/* Botão único alternável no topo do dropdown */
.dropdown-acoes-topo { padding: 4px 12px; border-bottom: 1px dashed #eee; background: #fdfdfd; text-align: center; }
.btn-alternar-todos { font-size: 11px; text-decoration: none; font-weight: bold; color: #0078D4; display: block; width: 100%; text-align: left; }
.btn-alternar-todos:hover { text-decoration: underline; }

/* Classe de alerta para destacar filas com dados divergentes ou erros */
tr.linha-erro {
  background-color: #ffcccc !important;
  color: #a30000;
}

/* Linha estilizada para músicos inativos */
tr.linha-inativo {
  background-color: #f2f2f2 !important;
  color: #777777;
  opacity: 0.8;
}

/* Divs para agrupar os instrumentos secundários lado a lado ou em bloco */
.bloco-instrumento { display: flex; flex-direction: column; gap: 4px; }
.par-campos { display: inline-block; vertical-align: middle; }

/* --- PAINEL DE AÇÕES E GRÁFICO --- */
.painel-acoes-grafico {
  display: flex;
  align-items: flex-start; 
  justify-content: flex-end; 
  gap: 30px;
  margin-bottom: 20px;
  background: #fff;
  padding: 15px;
  border-radius: 8px;
  box-shadow: 0px 2px 5px rgba(0,0,0,0.05);
}

/* Gráfico e listas alinhados lado a lado */
.grafico-container {
  display: none; 
  flex: 1;
  flex-direction: row; 
  align-items: flex-start;
  gap: 25px;
}

.canvas-wrapper {
  max-width: 180px;
  width: 180px;
  flex-shrink: 0;
}

/* Painel das duas listas também lado a lado */
.grafico-listas-painel {
  display: flex;
  flex-direction: row; 
  gap: 20px;
  flex: 1;
}

/* Cada coluna de lista se expande individualmente */
.grafico-coluna-lista {
  font-size: 12px;
  max-height: 180px;
  overflow-y: auto;
  flex: 1;
  border: 1px solid #f0f0f0;
  border-radius: 4px;
  padding: 8px;
  background: #fafafa;
}

.grafico-coluna-lista h4 {
  margin: 0 0 8px 0;
  font-size: 13px;
  color: #0078D4;
  border-bottom: 2px solid #0078D4;
  padding-bottom: 3px;
}

/* Itens internos: na vertical */
.grafico-coluna-lista .lista-itens-vertical {
  display: flex;
  flex-direction: column; 
}

.grafico-coluna-lista .item-linha {
  display: flex;
  justify-content: space-between;
  padding: 4px 0;
  border-bottom: 1px dashed #eee;
}
.grafico-coluna-lista .item-nome {
  font-weight: bold;
  color: #333;
}
.grafico-coluna-lista .item-valor {
  color: #0078D4;
  font-weight: bold;
}

/* Coluna de ações na horizontal */
.coluna-direita-acoes {
  display: flex;
  flex-direction: column; 
  align-items: flex-end;
  gap: 15px;
}

#contador {
  font-size: 14px;
  white-space: nowrap;
}

.botoes-acao {
  display: flex;
  flex-direction: row; 
  gap: 8px;
  flex-wrap: wrap;
  justify-content: flex-end;
}

/* Botões menores e compactos */
.botoes-acao button {
  padding: 8px 12px; 
  font-size: 12px;
  font-weight: bold;
  border: none;
  cursor: pointer;
  border-radius: 4px;
  text-align: center;
  box-sizing: border-box;
  white-space: nowrap;
}

.btn-excel { background: #107C41; color: white; }
.btn-excel:hover { background: #0b592e; }
.btn-importar { background: #0078D4; color: white; }
.btn-importar:hover { background: #005a9e; }
.btn-excluir-tudo { background: #d11a2a; color: white; }
.btn-excluir-tudo:hover { background: #9c101c; }
.btn-alternar-grafico { background: #8b5cf6; color: white; }
.btn-alternar-grafico:hover { background: #7c3aed; }
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

</head>
<body>

<div id="tela-login">
  <h2>Iniciar Sesión</h2>
  <p>Registro de Músicos CCA</p>
  <input type="email" id="login-email" placeholder="Correo electrónico" required>
  <input type="password" id="login-senha" placeholder="Contraseña" required>
  <button type="button" id="btn-entrar">Entrar</button>
</div>

<div id="conteudo-sistema">

  <img src="logo.png" class="logo-topo">
  <h1>Registro de Músicos CCA</h1>

  <div class="busca-container">
    <input type="text" id="busca" placeholder="Buscar...">
    <button type="button" id="btn-limpar-busca" class="btn-limpar" title="Limpiar búsqueda y filtros">❌</button>
  </div>

  <div class="filtros">
    
    <div class="multiselect">
      <div class="selectBox" id="abrir-filtros-igrejas">
        <select><option id="texto-filtro-igrejas">Todas las Iglesias</option></select>
        <div class="overSelect"></div>
      </div>
      <div id="checkboxes-igrejas" class="checkboxes-dropdown"></div>
    </div>
    
    <div class="multiselect">
      <div class="selectBox" id="abrir-filtros-instrumentos">
        <select><option id="texto-filtro-instrumentos">Todos los Instrumentos</option></select>
        <div class="overSelect"></div>
      </div>
      <div id="checkboxes-instrumentos" class="checkboxes-dropdown"></div>
    </div>

    <div class="multiselect">
      <div class="selectBox" id="abrir-filtros-tipos">
        <select><option id="texto-filtro-tipos">Todos los Tipos</option></select>
        <div class="overSelect"></div>
      </div>
      <div id="checkboxes-tipos" class="checkboxes-dropdown"></div>
    </div>

    <div class="multiselect">
      <div class="selectBox">
        <select id="filtro-status">
          <option value="todos">Todos los Estados</option>
          <option value="activos">Solo Activos</option>
          <option value="inativos">Solo Inactivos</option>
        </select>
      </div>
    </div>

  </div>

  <div class="painel-acoes-grafico">
    <div class="grafico-container" id="grafico-container">
      <div class="canvas-wrapper">
        <canvas id="graficoInstrumentos"></canvas>
      </div>
      
      <div class="grafico-listas-painel">
        <div class="grafico-coluna-lista">
          <h4>Instrumentos (%)</h4>
          <div id="lista-porcentagens" class="lista-itens-vertical"></div>
        </div>
        
        <div class="grafico-coluna-lista">
          <h4>Músicos por Iglesia</h4>
          <div id="lista-igrejas-qtd" class="lista-itens-vertical"></div>
        </div>
      </div>
    </div>

    <div class="coluna-direita-acoes">
      <div id="contador"><strong>Total: 0 músico(s)</strong></div>
      <div class="botoes-acao">
        <input type="file" id="inputImportar" accept=".csv" style="display: none;">
        <button type="button" class="btn-excluir-tudo" id="btn-excluir-tudo">🚨 Eliminar Todo</button>
        <button type="button" class="btn-importar" id="btn-clique-importar">📥 Importar CSV</button>
        <button type="button" class="btn-excel" id="btn-exportar">📊 Exportar Excel</button>
        <button type="button" class="btn-alternar-grafico" id="btn-toggle-grafico">📊 Mostrar Gráfico</button>
      </div>
    </div>
  </div>

  <form id="formMusico">
    <select id="igreja" required></select>
    <input type="text" id="nome" placeholder="Nombre" required>
    
    <div class="par-campos">
      <select id="instrumento1" required></select>
      <select id="tipo" required>
        <option value="">Tipo 1</option>
      </select>
    </div>

    <div class="par-campos" id="container-segundo-instrumento" style="display:none;">
      <select id="instrumento2"></select>
      <select id="tipo2">
        <option value="">Tipo 2</option>
      </select>
    </div>

    <button type="button" class="plus-btn" id="btn-mais-instrumento">+</button>

    <input type="tel" id="contato" maxlength="18" placeholder="+54 9 11 1234-5678" required>

    <button type="submit">Guardar</button>
  </form>

  <div>
    <button type="button" class="btn-whatsapp-lote" id="btn-enviar-selecionados">💬 Enviar WhatsApp a Seleccionados</button>
  </div>

  <table>
  <thead>
  <tr>
  <th style="width: 30px; cursor: default;"><input type="checkbox" id="selecionar-todos-tabela" title="Seleccionar/Desmarcar todos los visibles"></th>
  <th>Iglesia</th>
  <th>Nombre</th>
  <th>Instrumento</th>
  <th>Tipo</th>
  <th>Contacto</th>
  <th>Observación</th>
  <th>Acciones</th>
  </tr>
  </thead>
  <tbody id="tabela"></tbody>
  </table>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, EmailAuthProvider, reauthenticateWithCredential } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDCTwZh5zlz_EBS3vjfyXKgBM-BibpMBnA",
  authDomain: "cadastro-musicos-cca-5d5fa.firebaseapp.com",
  databaseURL: "https://cadastro-musicos-cca-5d5fa-default-rtdb.firebaseio.com",
  projectId: "cadastro-musicos-cca-5d5fa",
  storageBucket: "cadastro-musicos-cca-5d5fa.firebasestorage.app",
  messagingSenderId: "195805035055",
  appId: "1:195805035055:web:48d0a486d25dc4e980a4da"
};

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);
const auth = getAuth(app);

const igrejas = ["Común Congregación","ALTO MERLO","BELLA VISTA","CAPITAL","CASEROS","CLAYPOLE","DONSELAR","GUERNICA","JOSE C. PAZ","LA PLATA","LAFERRERE","LOMAS DE GUERNICA","MERLO","MORENO","PACHECO","SANTA BRIGIDA","SARANDI","SPEGAZZINI","VILLA LYNCH","VILLA TORO","ZÁRATE"];
const instrumentos = ["ORGANISTA","ACORDEÓN","VIOLÍN","VIOLA","CELLO","FLAUTA","CLARINETE","CLARINETE BAJO","CLARÓN","OBOE","FAGOT","SAXO SOPRANO","SAXO ALTO","SAXO TENOR","SAXO BARÍTONO","TROMPETA","FISCORNO","TROMPPA","TROMBÓN","BOMBARDINO","TUBA"];
const tipos = ["ENC. REGIONAL", "ENCARGADO", "EXAMINADORA", "INSTRUCTOR", "OFICIALIZADO", "CULTO OFICIAL", "RJM / ENSAYO", "ALUMNO"];

const igrejaSelect = document.getElementById("igreja");
const instrumento1 = document.getElementById("instrumento1");
const instrumento2 = document.getElementById("instrumento2");
const tipo1Select = document.getElementById("tipo");
const tipo2Select = document.getElementById("tipo2");
const containerSegundoInstrumento = document.getElementById("container-segundo-instrumento");

const tabela = document.getElementById("tabela");
const busca = document.getElementById("busca");
const btnLimparBusca = document.getElementById("btn-limpar-busca");
const contador = document.getElementById("contador");
const inputContato = document.getElementById("contato");

const containerIgrejas = document.getElementById("checkboxes-igrejas");
const textoFiltroIgrejas = document.getElementById("texto-filtro-igrejas");
const containerInstrumentos = document.getElementById("checkboxes-instrumentos");
const textoFiltroInstrumentos = document.getElementById("texto-filtro-instrumentos");
const containerTipos = document.getElementById("checkboxes-tipos");
const textoFiltroTipos = document.getElementById("texto-filtro-tipos");
const filtroStatus = document.getElementById("filtro-status");
const chkSelecionarTodosTabela = document.getElementById("selecionar-todos-tabela");

let lista = []; 
let editKey = null; 
let filtrados = []; 
let meuGrafico = null; 

let colunaOrdenada = "nome"; 
let ordemCrescente = true;   

const telaLogin = document.getElementById("tela-login");
const conteudoSistema = document.getElementById("conteudo-sistema");

onAuthStateChanged(auth, (user) => {
  if (user) {
    telaLogin.style.display = "none";
    conteudoSistema.style.display = "block";
    
    onValue(ref(database, 'musicos'), (snapshot) => {
      lista = [];
      snapshot.forEach((childSnapshot) => {
        lista.push({
          key: childSnapshot.key,
          ...childSnapshot.val()
        });
      });
      atualizar();
    });
  } else {
    telaLogin.style.display = "block";
    conteudoSistema.style.display = "none";
    tabela.innerHTML = "";
  }
});

document.getElementById("btn-entrar").addEventListener("click", () => {
  const email = document.getElementById("login-email").value;
  const senha = document.getElementById("login-senha").value;
  signInWithEmailAndPassword(auth, email, senha).catch((error) => {
    alert("Error ao iniciar sesión: Verifique as credenciais.");
    console.error(error);
  });
});

igrejas.forEach(i=>{ igrejaSelect.innerHTML += `<option>${i}</option>`; });

instrumento1.innerHTML = `<option value="">Instrumento 1</option>`;
instrumento2.innerHTML = `<option value="">Instrumento 2 (Opcional)</option>`;
instrumentos.forEach(i=>{
  instrumento1.innerHTML += `<option>${i}</option>`;
  instrumento2.innerHTML += `<option>${i}</option>`;
});

tipos.forEach(t => {
  tipo1Select.innerHTML += `<option>${t}</option>`;
  tipo2Select.innerHTML += `<option>${t}</option>`;
});

containerIgrejas.innerHTML = `<div class="dropdown-acoes-topo"><a href="#" class="btn-alternar-todos" id="btn-toggle-igrejas">Seleccionar Todas</a></div>`;
containerInstrumentos.innerHTML = `<div class="dropdown-acoes-topo"><a href="#" class="btn-alternar-todos" id="btn-toggle-instrumentos">Seleccionar Todos</a></div>`;
containerTipos.innerHTML = `<div class="dropdown-acoes-topo"><a href="#" class="btn-alternar-todos" id="btn-toggle-tipos">Seleccionar Todos</a></div>`;

igrejas.forEach(ig => {
  const label = document.createElement("label");
  label.innerHTML = `<input type="checkbox" value="${ig}" class="chk-igreja"> ${ig}`;
  containerIgrejas.appendChild(label);
});
instrumentos.forEach(inst => {
  const label = document.createElement("label");
  label.innerHTML = `<input type="checkbox" value="${inst}" class="chk-instrumento"> ${inst}`;
  containerInstrumentos.appendChild(label);
});
tipos.forEach(tp => {
  const label = document.createElement("label");
  label.innerHTML = `<input type="checkbox" value="${tp}" class="chk-tipo"> ${tp}`;
  containerTipos.appendChild(label);
});

function gerenciarBotaoAlternar(idBotao, classeCheckboxes, textoPadrao, textoPlural, elementoTextoFiltro) {
  const botao = document.getElementById(idBotao);
  botao.addEventListener("click", (e) => {
    e.preventDefault(); e.stopPropagation();
    const chks = document.querySelectorAll(`.${classeCheckboxes}`);
    const marcados = document.querySelectorAll(`.${classeCheckboxes}:checked`);
    if (marcados.length < chks.length) {
      chks.forEach(chk => chk.checked = true);
      botao.textContent = textoPlural === "Instrumentos" || textoPlural === "Tipos" ? "Desmarcar Todos" : "Desmarcar Todas";
      elementoTextoFiltro.textContent = `${chks.length} Seleccionadas`;
    } else {
      chks.forEach(chk => chk.checked = false);
      botao.textContent = textoPlural === "Instrumentos" || textoPlural === "Tipos" ? "Seleccionar Todos" : "Seleccionar Todas";
      elementoTextoFiltro.textContent = textoPadrao;
    }
    atualizar();
  });
}

function monitorarMudancasCheckboxes(idBotao, classeCheckboxes, textoPlural) {
  const checkboxes = document.querySelectorAll(`.${classeCheckboxes}`);
  checkboxes.forEach(chk => {
    chk.addEventListener("change", () => {
      const botao = document.getElementById(idBotao);
      const marcados = document.querySelectorAll(`.${classeCheckboxes}:checked`);
      if (marcados.length === checkboxes.length) {
        botao.textContent = textoPlural === "Instrumentos" || textoPlural === "Tipos" ? "Desmarcar Todos" : "Desmarcar Todas";
      } else {
        botao.textContent = textoPlural === "Instrumentos" || textoPlural === "Tipos" ? "Seleccionar Todos" : "Seleccionar Todas";
      }
    });
  });
}

gerenciarBotaoAlternar("btn-toggle-igrejas", "chk-igreja", "Todas las Iglesias", "Iglesias", textoFiltroIgrejas);
gerenciarBotaoAlternar("btn-toggle-instrumentos", "chk-instrumento", "Todos los Instrumentos", "Instrumentos", textoFiltroInstrumentos);
gerenciarBotaoAlternar("btn-toggle-tipos", "chk-tipo", "Todos los Tipos", "Tipos", textoFiltroTipos);

monitorarMudancasCheckboxes("btn-toggle-igrejas", "chk-igreja", "Iglesias");
monitorarMudancasCheckboxes("btn-toggle-instrumentos", "chk-instrumento", "Instrumentos");
monitorarMudancasCheckboxes("btn-toggle-tipos", "chk-tipo", "Tipos");

function fecharTodosDropdowns() {
  containerIgrejas.style.display = "none";
  containerInstrumentos.style.display = "none";
  containerTipos.style.display = "none";
}

document.getElementById("abrir-filtros-igrejas").addEventListener("click", (e) => {
  e.stopPropagation(); const visivel = containerIgrejas.style.display === "block"; fecharTodosDropdowns(); if (!visivel) containerIgrejas.style.display = "block";
});
document.getElementById("abrir-filtros-instrumentos").addEventListener("click", (e) => {
  e.stopPropagation(); const visivel = containerInstrumentos.style.display === "block"; fecharTodosDropdowns(); if (!visivel) containerInstrumentos.style.display = "block";
});
document.getElementById("abrir-filtros-tipos").addEventListener("click", (e) => {
  e.stopPropagation(); const visivel = containerTipos.style.display === "block"; fecharTodosDropdowns(); if (!visivel) containerTipos.style.display = "block";
});

document.addEventListener("click", fecharTodosDropdowns);
containerIgrejas.addEventListener("click", (e) => { e.stopPropagation(); });
containerInstrumentos.addEventListener("click", (e) => { e.stopPropagation(); });
containerTipos.addEventListener("click", (e) => { e.stopPropagation(); });

function pegarValoresSelecionados(className) {
  const checkboxes = document.querySelectorAll(`.${className}`);
  let selecionados = [];
  checkboxes.forEach(chk => { if(chk.checked) { selecionados.push(chk.value); } });
  return selecionados;
}

containerIgrejas.addEventListener("change", () => {
  const sel = pegarValoresSelecionados("chk-igreja");
  textoFiltroIgrejas.textContent = sel.length === 0 ? "Todas las Iglesias" : (sel.length === 1 ? sel[0] : `${sel.length} Seleccionadas`);
  atualizar();
});
containerInstrumentos.addEventListener("change", () => {
  const sel = pegarValoresSelecionados("chk-instrumento");
  textoFiltroInstrumentos.textContent = sel.length === 0 ? "Todos los Instrumentos" : (sel.length === 1 ? sel[0] : `${sel.length} Selecionados`);
  atualizar();
});
containerTipos.addEventListener("change", () => {
  const sel = pegarValoresSelecionados("chk-tipo");
  textoFiltroTipos.textContent = sel.length === 0 ? "Todos los Tipos" : (sel.length === 1 ? sel[0] : `${sel.length} Seleccionados`);
  atualizar();
});

filtroStatus.addEventListener("change", atualizar);

document.getElementById("btn-mais-instrumento").addEventListener("click", () => {
  containerSegundoInstrumento.style.display = "inline-block";
});

function aplicarMascaraContato(input) {
  input.addEventListener("input", function (e) {
    let value = e.target.value.replace(/\D/g, '');
    if (value.startsWith("54")) value = value.substring(2);
    if (value.startsWith("9")) value = value.substring(1);
    value = value.substring(0, 10);
    let formatted = "+54 9";
    if (value.length >= 1) formatted += " " + value.substring(0, 2);
    if (value.length >= 3) formatted += " " + value.substring(2, 6);
    if (value.length >= 7) formatted += "-" + value.substring(6, 10);
    e.target.value = formatted;
  });
}

aplicarMascaraContato(inputContato);

/* --- 📊 ATUALIZAÇÃO DO GRÁFICO E LISTAS LATERAIS --- */
function atualizarGrafico(dadosFiltrados) {
  const ctx = document.getElementById('graficoInstrumentos').getContext('2d');
  const divListaPct = document.getElementById('lista-porcentagens');
  const divListaIgrejas = document.getElementById('lista-igrejas-qtd');
  
  const contagemInstrumentos = {};
  const contagemIgrejas = {};
  let totalInstrumentos = 0;

  const instrumentosSelecionados = pegarValoresSelecionados("chk-instrumento");

  dadosFiltrados.forEach(m => {
    if (m.inativo) return;

    if (m.instrumento) {
      const insts = m.instrumento.split(",").map(i => i.trim());
      insts.forEach(inst => {
        if (inst) {
          if (instrumentosSelecionados.length === 0 || instrumentosSelecionados.includes(inst)) {
            contagemInstrumentos[inst] = (contagemInstrumentos[inst] || 0) + 1;
            totalInstrumentos++;
          }
        }
      });
    }
    if (m.igreja) {
      contagemIgrejas[m.igreja] = (contagemIgrejas[m.igreja] || 0) + 1;
    }
  });

  if (meuGrafico) { meuGrafico.destroy(); }
  divListaPct.innerHTML = "";
  divListaIgrejas.innerHTML = "";

  if (dadosFiltrados.length === 0 || totalInstrumentos === 0) return;

  const labelsInst = Object.keys(contagemInstrumentos);
  const valoresInst = Object.values(contagemInstrumentos);
  const porcentagensInst = valoresInst.map(v => ((v / totalInstrumentos) * 100).toFixed(1));

  const itensInstOrdenados = labelsInst.map((label, idx) => ({
    label,
    quantidade: valoresInst[idx],
    porcentagem: porcentagensInst[idx]
  })).sort((a, b) => b.quantidade - a.quantidade);

  itensInstOrdenados.forEach(item => {
    divListaPct.innerHTML += `
      <div class="item-linha">
        <span class="item-nome">${item.label} (${item.quantidade})</span>
        <span class="item-valor">${item.porcentagem}%</span>
      </div>
    `;
  });

  const itensIgrejasOrdenados = Object.keys(contagemIgrejas).map(igrejaNome => ({
    igrejaNome,
    quantidade: contagemIgrejas[igrejaNome]
  })).sort((a, b) => b.quantidade - a.quantidade);

  itensIgrejasOrdenados.forEach(item => {
    divListaIgrejas.innerHTML += `
      <div class="item-linha">
        <span class="item-nome">${item.igrejaNome} (${item.quantidade})</span>
        <span class="item-valor"></span>
      </div>
    `;
  });

  meuGrafico = new Chart(ctx, {
    type: 'pie',
    data: {
      labels: labelsInst,
      datasets: [{
        data: porcentagensInst,
        backgroundColor: [
          '#0078D4', '#107C41', '#d11a2a', '#ff9900', '#10b981', '#3b82f6', 
          '#8b5cf6', '#ec4899', '#f59e0b', '#6b7280', '#14b8a6', '#a855f7'
        ]
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { display: false }, 
        tooltip: {
          callbacks: { label: function(context) { return ` ${context.label}: ${context.raw}%`; } }
        },
        title: { display: true, text: '% por Instrumento', font: { size: 11 } }
      }
    }
  });
}

function atualizar(){
  const texto = busca.value.toLowerCase();
  const igrejasSelecionadas = pegarValoresSelecionados("chk-igreja");
  const instrumentosSelecionados = pegarValoresSelecionados("chk-instrumento");
  const tiposSelecionadas = pegarValoresSelecionados("chk-tipo");
  const statusSelecionado = filtroStatus.value;

  // Desmarca a seleção geral quando reconstrói a lista filtrada
  chkSelecionarTodosTabela.checked = false;

  tabela.innerHTML = "";
  const contagemNomes = {};
  lista.forEach(m => {
    if (m.nome) {
      const nomeNormalizado = m.nome.trim().toUpperCase();
      contagemNomes[nomeNormalizado] = (contagemNomes[nomeNormalizado] || 0) + 1;
    }
  });

  filtrados = lista
  .filter(m => {
    if (statusSelecionado === "activos" && m.inativo) return false;
    if (statusSelecionado === "inativos" && !m.inativo) return false;

    return (
      (igrejasSelecionadas.length === 0 || igrejasSelecionadas.includes(m.igreja)) &&
      (tiposSelecionadas.length === 0 || tiposSelecionadas.some(t => m.tipo && m.tipo.includes(t))) &&
      (instrumentosSelecionados.length === 0 || instrumentosSelecionados.some(inst => m.instrumento && m.instrumento.includes(inst))) &&
      (
        m.nome.toLowerCase().includes(texto) ||
        (m.instrumento && m.instrumento.toLowerCase().includes(texto))
      )
    );
  })
  .sort((a, b) => {
    let valorA = a[colunaOrdenada] ? a[colunaOrdenada].toLowerCase() : "";
    let valorB = b[colunaOrdenada] ? b[colunaOrdenada].toLowerCase() : "";
    return ordemCrescente ? valorA.localeCompare(valorB) : valorB.localeCompare(valorA);
  });

  filtrados.forEach((m)=>{
    const tr = document.createElement("tr");
    const nomeNormalizado = m.nome ? m.nome.trim().toUpperCase() : "";
    
    if (m.inativo) {
      tr.classList.add("linha-inativo");
    } else if (m.invalid || (contagemNomes[nomeNormalizado] > 1)) { 
      tr.classList.add("linha-erro"); 
    }

    const insts = m.instrumento ? m.instrumento.split(", ") : [""];
    const tps = m.tipo ? m.tipo.split(", ") : [""];

    const numeroLimpo = m.contato ? m.contato.replace(/\D/g, '') : '';

    if (editKey === m.key) {
      const optionsIgrejas = igrejas.map(i => `<option value="${i}" ${i === m.igreja ? 'selected' : ''}>${i}</option>`).join('');
      const optionsInst1 = instrumentos.map(i => `<option value="${i}" ${i === insts[0] ? 'selected' : ''}>${i}</option>`).join('');
      const optionsInst2 = instrumentos.map(i => `<option value="${i}" ${i === insts[1] ? 'selected' : ''}>${i}</option>`).join('');
      const optionsTipo1 = tipos.map(t => `<option value="${t}" ${t === tps[0] ? 'selected' : ''}>${t}</option>`).join('');
      const optionsTipo2 = tipos.map(t => `<option value="${t}" ${t === tps[1] ? 'selected' : ''}>${t}</option>`).join('');

      tr.innerHTML = `
        <td></td>
        <td><select class="edit-igreja" style="width:100%; padding:4px;">${optionsIgrejas}</select></td>
        <td><input type="text" class="edit-nome" value="${m.nome}" style="width:90%; padding:4px;" required></td>
        <td>
          <div class="bloco-instrumento">
            <select class="edit-inst1" style="width:100%; padding:4px;">${optionsInst1}</select>
            <select class="edit-inst2" style="width:100%; padding:4px; ${insts[1] ? '' : 'display:none;'}">
              <option value="">Segundo Instrumento (Opcional)</option>
              ${optionsInst2}
            </select>
            <button type="button" class="btn-edit-mais" style="padding:2px 6px; font-size:11px; ${insts[1] ? 'display:none;' : ''}">+</button>
          </div>
        </td>
        <td>
          <div class="bloco-instrumento">
            <select class="edit-tipo1" style="width:100%; padding:4px;">${optionsTipo1}</select>
            <select class="edit-tipo2" style="width:100%; padding:4px; ${insts[1] ? '' : 'display:none;'}">
              <option value="">Segundo Tipo (Opcional)</option>
              ${optionsTipo2}
            </select>
          </div>
        </td>
        <td><input type="text" class="edit-contato" value="${m.contato}" style="width:90%; padding:4px;" required></td>
        <td>
          <div style="display: flex; flex-direction: column; gap: 2px;">
            <label style="font-size: 11px;"><input type="checkbox" class="edit-inativo" ${m.inativo ? 'checked' : ''}> Inativo</label>
            <input type="text" class="edit-motivo" value="${m.motivoInativo || ''}" placeholder="Motivo..." style="font-size:11px; padding:2px; ${m.inativo ? '' : 'display:none;'}">
          </div>
        </td>
        <td>
          <button class="btn-salvar-inline" title="Guardar">💾</button>
          <button class="btn-cancelar-inline" title="Cancelar">❌</button>
        </td>
      `;

      const btnMais = tr.querySelector(".btn-edit-mais");
      const selectInst2 = tr.querySelector(".edit-inst2");
      const selectTipo2 = tr.querySelector(".edit-tipo2");
      const chkEditInativo = tr.querySelector(".edit-inativo");
      const txtEditMotivo = tr.querySelector(".edit-motivo");
      
      btnMais.addEventListener("click", () => {
        selectInst2.style.display = "block";
        selectTipo2.style.display = "block";
        btnMais.style.display = "none";
      });

      chkEditInativo.addEventListener("change", () => {
        txtEditMotivo.style.display = chkEditInativo.checked ? "block" : "none";
        if (!chkEditInativo.checked) txtEditMotivo.value = "";
      });

      aplicarMascaraContato(tr.querySelector(".edit-contato"));
      tr.querySelector(".btn-salvar-inline").addEventListener("click", () => salvarInline(m.key, tr));
      tr.querySelector(".btn-cancelar-inline").addEventListener("click", () => cancelarEdicao());
    } else {
      let htmlInstrumentos = "";
      let htmlTipos = "";
      insts.forEach((inst, idx) => {
        const tipoCorr = tps[idx] || tps[0] || "";
        if(inst) {
          htmlInstrumentos += `<div>${inst}</div>`;
          htmlTipos += `<div>${tipoCorr}</div>`;
        }
      });

      let htmlInativo = m.inativo 
        ? `❌ Inactivo <span style="font-size:11px; display:inline-block; color:#cc0000; margin-left:5px;">- ${m.motivoInativo || 'Sin Motivo'}</span>` 
        : '✅ Activo';

      tr.innerHTML = `
        <td style="text-align: center;"><input type="checkbox" class="chk-musico-tabela" value="${numeroLimpo}"></td>
        <td>${m.igreja}</td>
        <td>${m.nome}</td>
        <td>${htmlInstrumentos}</td>
        <td>${htmlTipos}</td>
        <td>${m.contato}</td>
        <td>${htmlInativo}</td>
        <td>
          <a href="https://wa.me/${numeroLimpo}" target="_blank" class="btn-whatsapp" title="Enviar WhatsApp">💬</a>
          <button class="btn-editar">✏️</button>
          <button class="btn-excluir">🗑️</button>
        </td>
      `;
      tr.querySelector(".btn-editar").addEventListener("click", () => editar(m.key));
      tr.querySelector(".btn-excluir").addEventListener("click", () => excluir(m.key));
    }
    tabela.appendChild(tr);
  });

  contador.innerHTML = `<strong>Total: ${filtrados.length} músico(s) filtrado(s)</strong>`;
  const container = document.getElementById("grafico-container");
  if (container.style.display === "flex") { atualizarGrafico(filtrados); }
}

document.getElementById("btn-enviar-selecionados").addEventListener("click", () => {
  const selecionados = document.querySelectorAll(".chk-musico-tabela:checked");

  }

  // Se forem vários, o navegador tentará bloquear múltiplos pop-ups se abertos em um laço rápido.
  // Abrimos uma confirmação clara informando ao usuário.

    selecionados.forEach((chk, index) => {

      setTimeout(() => {
        if (chk.value) {

        }
      }, index * 400); 
    });

});

function editar(key){ editKey = key; atualizar(); }
function cancelarEdicao() { editKey = null; atualizar(); }

/* --- FUNÇÃO AJUSTADA COM ATUALIZAÇÃO IMEDIATA DO COORDENADOR --- */
function salvarInline(key, tr) {
  const nomeNovo = tr.querySelector(".edit-nome").value.trim().toUpperCase();
  const contatoNovo = tr.querySelector(".edit-contato").value.trim();
  if (!nomeNovo || !contatoNovo) { alert("Por favor, complete los campos requeridos."); return; }

  const inst1 = tr.querySelector(".edit-inst1").value;
  const selectInst2 = tr.querySelector(".edit-inst2");
  const tp1 = tr.querySelector(".edit-tipo1").value;
  const selectTipo2 = tr.querySelector(".edit-tipo2");
  const chkInativo = tr.querySelector(".edit-inativo").checked;
  const txtMotivo = tr.querySelector(".edit-motivo").value.trim();

  let instrumentosFinal = [inst1];
  let tiposFinal = [tp1];

  if (selectInst2.style.display !== "none" && selectInst2.value) {
    instrumentosFinal.push(selectInst2.value);
    tiposFinal.push(selectTipo2.value || tp1);
  }

  const dados = {
    igreja: tr.querySelector(".edit-igreja").value,
    nome: nomeNovo,
    instrumento: instrumentosFinal.join(", "),
    tipo: tiposFinal.join(", "),
    contato: contatoNovo,
    inativo: chkInativo,
    motivoInativo: chkInativo ? txtMotivo : ""
  };

  set(ref(database, 'musicos/' + key), dados).then(() => { 
    editKey = null; 
    atualizar(); 
  }).catch((e) => console.error(e));
}

function excluir(key){ if(confirm("¿Realmente deseja eliminar a este músico?")) { remove(ref(database, 'musicos/' + key)); } }

document.getElementById("btn-clique-importar").addEventListener("click", () => { document.getElementById("inputImportar").click(); });

document.getElementById("inputImportar").addEventListener("change", (event) => {
  const archivo = event.target.files[0]; if (!archivo) return;
  const lector = new FileReader();
  lector.onload = function(e) {
    const contenido = e.target.result; const lineas = contenido.split(/\r?\n/);
    if (lineas.length <= 1 || lineas[0].trim() === "") { alert("El archivo no es válido."); return; }
    const processadosNoCsv = new Set();

    for (let i = 1; i < lineas.length; i++) {
      const linea = lineas[i].trim(); if (linea === "") continue; 
      const campos = linea.split(";");
      if (campos.length >= 5) {
        const igrejaImportar = campos[0].trim().toUpperCase();
        const nomeImportar = campos[1].trim().toUpperCase();
        const instrumentoImportar = campos[2].trim().toUpperCase();
        const tipoImportar = campos[3].trim().toUpperCase();
        const contatoImportar = campos[4].trim().toUpperCase();
        const inativoImportar = campos[5] ? campos[5].trim().toUpperCase() === 'SI' : false;
        const motivoImportar = campos[6] ? campos[6].trim() : "";

        const chaveComposta = `${nomeImportar}|${igrejaImportar}`;
        const jaExisteNoFirebase = lista.some(m => m.nome.toUpperCase() === nomeImportar && m.igreja.toUpperCase() === igrejaImportar);
        if (processadosNoCsv.has(chaveComposta) || jaExisteNoFirebase) { continue; }
        processadosNoCsv.add(chaveComposta);

        const igrejaValida = igrejas.map(x => x.toUpperCase()).includes(igrejaImportar);
        const tpsImportados = tipoImportar.split(",").map(x => x.trim());
        const tipoValido = tpsImportados.every(t => tipos.map(x => x.toUpperCase()).includes(t));
        const instsImportados = instrumentoImportar.split(",").map(x => x.trim());
        const instrumentosValidos = instsImportados.every(inst => instrumentos.map(x => x.toUpperCase()).includes(inst));

        let dados = { 
          igreja: igrejaImportar, 
          nome: nomeImportar, 
          instrumento: instrumentoImportar, 
          tipo: tipoImportar, 
          contato: contatoImportar,
          inativo: inativoImportar,
          motivoInativo: motivoImportar
        };
        if (!igrejaValida || !tipoValido || !instrumentosValidos) { dados.invalid = true; }
        push(ref(database, 'musicos'), dados);
      }
    }
    alert(`Importación finalizada.`); event.target.value = '';
  };
  lector.readAsText(archivo, 'UTF-8');
});

document.getElementById("btn-excluir-tudo").addEventListener("click", () => {
  if (lista.length === 0) { alert("No hay ningún registro para eliminar."); return; }
  if (!confirm("⚠️ ATENCIÓN: Esta acción eliminará por completo a TODOS los músicos. ¿Continuar?")) return;
  const senhaInformada = prompt("Introduzca su contraseña:");
  if (!senhaInformada) return;
  const usuarioAtual = auth.currentUser;
  if (usuarioAtual && usuarioAtual.email) {
    const credencial = EmailAuthProvider.credential(usuarioAtual.email, senhaInformada);
    reauthenticateWithCredential(usuarioAtual, credencial).then(() => {
      if (confirm("¿Confirmar eliminación total?")) {
        remove(ref(database, 'musicos')).then(() => alert("💥 Dados limpos."));
      }
    }).catch(() => alert("❌ Contraseña incorrecta."));
  }
});

function ordenarPor(coluna) {
  if (colunaOrdenada === coluna) { ordemCrescente = !ordemCrescente; } else { colunaOrdenada = coluna; ordemCrescente = true; }
  atualizar();
}
