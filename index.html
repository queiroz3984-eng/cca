<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro de Músicos CCA</title>

<style>
body { font-family: Arial; background:#f4f4f4; padding:20px; margin-top: 60px; }
form, table { background:#fff; padding:15px; border-radius:8px; margin-bottom:20px; }
input, select { padding:8px; margin:5px; width:180px; }
button { padding:6px 10px; border:none; cursor:pointer; border-radius:5px; }
.plus-btn { width:auto; background:#0078D4; color:white; }
table { width:100%; border-collapse:collapse; }
th, td { padding:10px; border:1px solid #ccc; }
th { background:#0078D4; color:white; }
#busca { width:250px; padding:10px; }
.logo-topo { position: absolute; top: 50px; right: 50px; width: 200px; }

/* Contenedor de acciones superiores y diseño de los botones */
.topo-acoes { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
.botoes-acao { display: flex; gap: 10px; }
.btn-excel { background: #107C41; color: white; font-weight: bold; padding: 8px 15px; border: none; cursor: pointer; border-radius: 5px; }
.btn-excel:hover { background: #0b592e; }
.btn-importar { background: #0078D4; color: white; font-weight: bold; padding: 8px 15px; border: none; cursor: pointer; border-radius: 5px; }
.btn-importar:hover { background: #005a9e; }

/* Novo botão de excluir tudo */
.btn-excluir-tudo { background: #d11a2a; color: white; font-weight: bold; padding: 8px 15px; border: none; cursor: pointer; border-radius: 5px; }
.btn-excluir-tudo:hover { background: #9c101c; }

/* Telas do Sistema */
#tela-login { max-width: 350px; margin: 100px auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); text-align: center; }
#tela-login input { width: 90%; display: block; margin: 10px auto; padding: 10px; }
#tela-login button { width: 96%; background: #0078D4; color: white; padding: 10px; font-weight: bold; margin-top: 10px; }
#conteudo-sistema { display: none; } /* Escondido por padrão */

/* Estilos comuns para Filtros de Múltipla Escolha (Dropdown Checkbox) */
.filtros { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 15px; }
.multiselect { width: 200px; position: relative; display: inline-block; font-size: 14px; vertical-align: middle; }
.selectBox { position: relative; }
.selectBox select { width: 100%; font-weight: normal; padding: 8px; margin: 0; }
.overSelect { position: absolute; left: 0; right: 0; top: 0; bottom: 0; cursor: pointer; }
.checkboxes-dropdown { display: none; border: 1px solid #ccc; border-top: none; position: absolute; background-color: #fff; width: 100%; z-index: 10; max-height: 250px; overflow-y: auto; box-shadow: 0px 4px 6px rgba(0,0,0,0.1); border-radius: 0 0 5px 5px; padding: 5px 0; }
.checkboxes-dropdown label { display: block; padding: 6px 12px; cursor: pointer; color: #333; text-align: left; }
.checkboxes-dropdown label:hover { background-color: #0078D4; color: white; }
.checkboxes-dropdown input { width: auto; margin-right: 10px; vertical-align: middle; }

/* Clase de alerta para destacar filas con datos divergentes o errores */
tr.linha-erro {
  background-color: #ffcccc !important;
  color: #a30000;
}
</style>

</head>
<body>

<div id="tela-login">
  <h2>Iniciar Sesión</h2>
  <p>Registro de Músicos CCA</p>
  <input type="email" id="login-email" placeholder="Correo electrónico" required>
  <input type="password" id="login-senha" placeholder="Contraseña" required>
  <button type="button" id="btn-entrar">Entrar</button>
</div>

<div id="conteudo-sistema">

  <img src="logo.png" class="logo-topo">
  <h1>Registro de Músicos CCA</h1>

  <input type="text" id="busca" placeholder="Buscar...">

  <div class="filtros">
    
    <div class="multiselect">
      <div class="selectBox" id="abrir-filtros-igrejas">
        <select><option id="texto-filtro-igrejas">Todas las Iglesias</option></select>
        <div class="overSelect"></div>
      </div>
      <div id="checkboxes-igrejas" class="checkboxes-dropdown"></div>
    </div>
    
    <div class="multiselect">
      <div class="selectBox" id="abrir-filtros-instrumentos">
        <select><option id="texto-filtro-instrumentos">Todos los Instrumentos</option></select>
        <div class="overSelect"></div>
      </div>
      <div id="checkboxes-instrumentos" class="checkboxes-dropdown"></div>
    </div>

    <div class="multiselect">
      <div class="selectBox" id="abrir-filtros-tipos">
        <select><option id="texto-filtro-tipos">Todos los Tipos</option></select>
        <div class="overSelect"></div>
      </div>
      <div id="checkboxes-tipos" class="checkboxes-dropdown"></div>
    </div>

  </div>

  <div class="topo-acoes">
    <div id="contador"><strong>Total: 0 músico(s)</strong></div>
    <div class="botoes-acao">
      <input type="file" id="inputImportar" accept=".csv" style="display: none;">
      <button type="button" class="btn-excluir-tudo" id="btn-excluir-tudo">🚨 Eliminar Todo el Registro</button>
      <button type="button" class="btn-importar" id="btn-clique-importar">📥 Importar Excel (.csv)</button>
      <button type="button" class="btn-excel" id="btn-exportar">📊 Exportar a Excel</button>
    </div>
  </div>

  <form id="formMusico">
  <select id="igreja" required></select>
  <input type="text" id="nome" placeholder="Nombre" required>
  <select id="instrumento1" required></select>
  <select id="instrumento2" style="display:none;"></select>
  <button type="button" class="plus-btn" id="btn-mais-instrumento">+</button>

  <input type="tel" id="contato" maxlength="18" placeholder="+54 9 11 1234-5678" required>

  <select id="tipo" required>
  <option value="">Seleccione</option>
  <option>ENC. REGIONAL</option>
  <option>ENCARGADO</option>
  <option>EXAMINADORA</option>
  <option>INSTRUCTOR</option>
  <option>OFICIALIZADO</option>
  <option>CULTO OFICIAL</option>
  <option>RJM / ENSAYO</option>
  <option>ALUMNO</option>
  </select>

  <button type="submit">Guardar</button>
  </form>

  <table>
  <thead>
  <tr>
  <th>Iglesia</th>
  <th>Nombre</th>
  <th>Instrumento</th>
  <th>Tipo</th>
  <th>Contacto</th>
  <th>Acciones</th>
  </tr>
  </thead>
  <tbody id="tabela"></tbody>
  </table>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, EmailAuthProvider, reauthenticateWithCredential } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

// Suas credenciais do Firebase
const firebaseConfig = {
  apiKey: "AIzaSyDCTwZh5zlz_EBS3vjfyXKgBM-BibpMBnA",
  authDomain: "cadastro-musicos-cca-5d5fa.firebaseapp.com",
  databaseURL: "https://cadastro-musicos-cca-5d5fa-default-rtdb.firebaseio.com",
  projectId: "cadastro-musicos-cca-5d5fa",
  storageBucket: "cadastro-musicos-cca-5d5fa.firebasestorage.app",
  messagingSenderId: "195805035055",
  appId: "1:195805035055:web:48d0a486d25dc4e980a4da"
};

// Inicializando os serviços
const app = initializeApp(firebaseConfig);
const database = getDatabase(app);
const auth = getAuth(app);

const igrejas = ["Común Congregación","ALTO MERLO","BELLA VISTA","CAPITAL","CASEROS","CLAYPOLE","DONSELAR","GUERNICA","JOSE C. PAZ","LA PLATA","LAFERRERE","LOMAS DE GUERNICA","MERLO","MORENO","PACHECO","SANTA BRIGIDA","SARANDI","SPEGAZZINI","VILLA LYNCH","VILLA TORO","ZÁRATE"];
const instrumentos = ["ORGANISTA","ACORDEÓN","VIOLÍN","VIOLA","CELLO","FLAUTA","CLARINETE","CLARINETE BAJO","CLARÓN","OBOE","FAGOT","SAXO SOPRANO","SAXO ALTO","SAXO TENOR","SAXO BARÍTONO","TROMPETA","FISCORNO","TROMPA","TROMBÓN","BOMBARDINO","TUBA"];
const tipos = ["ENC. REGIONAL", "ENCARGADO", "EXAMINADORA", "INSTRUCTOR", "OFICIALIZADO", "CULTO OFICIAL", "RJM / ENSAYO", "ALUMNO"];

const igrejaSelect = document.getElementById("igreja");
const instrumento1 = document.getElementById("instrumento1");
const instrumento2 = document.getElementById("instrumento2");
const tabela = document.getElementById("tabela");
const busca = document.getElementById("busca");
const contador = document.getElementById("contador");
const inputContato = document.getElementById("contato");

// Referências dos filtros múltiplos
const containerIgrejas = document.getElementById("checkboxes-igrejas");
const textoFiltroIgrejas = document.getElementById("texto-filtro-igrejas");

const containerInstrumentos = document.getElementById("checkboxes-instrumentos");
const textoFiltroInstrumentos = document.getElementById("texto-filtro-instrumentos");

const containerTipos = document.getElementById("checkboxes-tipos");
const textoFiltroTipos = document.getElementById("texto-filtro-tipos");

let lista = []; 
let editKey = null; 
let filtrados = []; 

// --- 🛡️ CONTROLE DE AUTENTICAÇÃO EM TEMPO REAL ---
const telaLogin = document.getElementById("tela-login");
const conteudoSistema = document.getElementById("conteudo-sistema");

onAuthStateChanged(auth, (user) => {
  if (user) {
    telaLogin.style.display = "none";
    conteudoSistema.style.display = "block";
    
    onValue(ref(database, 'musicos'), (snapshot) => {
      lista = [];
      snapshot.forEach((childSnapshot) => {
        lista.push({
          key: childSnapshot.key,
          ...childSnapshot.val()
        });
      });
      atualizar();
    });

  } else {
    telaLogin.style.display = "block";
    conteudoSistema.style.display = "none";
    tabela.innerHTML = "";
  }
});

document.getElementById("btn-entrar").addEventListener("click", () => {
  const email = document.getElementById("login-email").value;
  const senha = document.getElementById("login-senha").value;

  signInWithEmailAndPassword(auth, email, senha)
    .catch((error) => {
      alert("Error ao iniciar sesión: Verifique as credenciais.");
      console.error(error);
    });
});

// --- ⚙️ CONFIGURAÇÃO DE INTERFACE DOS MÚSICOS ---
igrejas.forEach(i=>{
  igrejaSelect.innerHTML += `<option>${i}</option>`;
});

// Configura selects de cadastro
instrumento1.innerHTML = `<option value="">Instrumento</option>`;
instrumento2.innerHTML = `<option value="">Instrumento</option>`;
instrumentos.forEach(i=>{
  instrumento1.innerHTML += `<option>${i}</option>`;
  instrumento2.innerHTML += `<option>${i}</option>`;
});

// Gerar Checkboxes dinamicamente para os 3 filtros
igrejas.forEach(ig => {
  const label = document.createElement("label");
  label.innerHTML = `<input type="checkbox" value="${ig}" class="chk-igreja"> ${ig}`;
  containerIgrejas.appendChild(label);
});

instrumentos.forEach(inst => {
  const label = document.createElement("label");
  label.innerHTML = `<input type="checkbox" value="${inst}" class="chk-instrumento"> ${inst}`;
  containerInstrumentos.appendChild(label);
});

tipos.forEach(tp => {
  const label = document.createElement("label");
  label.innerHTML = `<input type="checkbox" value="${tp}" class="chk-tipo"> ${tp}`;
  containerTipos.appendChild(label);
});

// --- CONTROLE DE ABERTURA/FECHAMENTO DOS DROPDOWNS ---
function fecharTodosDropdowns() {
  containerIgrejas.style.display = "none";
  containerInstrumentos.style.display = "none";
  containerTipos.style.display = "none";
}

document.getElementById("abrir-filtros-igrejas").addEventListener("click", (e) => {
  e.stopPropagation();
  const visivel = containerIgrejas.style.display === "block";
  fecharTodosDropdowns();
  if (!visivel) containerIgrejas.style.display = "block";
});

document.getElementById("abrir-filtros-instrumentos").addEventListener("click", (e) => {
  e.stopPropagation();
  const visivel = containerInstrumentos.style.display === "block";
  fecharTodosDropdowns();
  if (!visivel) containerInstrumentos.style.display = "block";
});

document.getElementById("abrir-filtros-tipos").addEventListener("click", (e) => {
  e.stopPropagation();
  const visivel = containerTipos.style.display === "block";
  fecharTodosDropdowns();
  if (!visivel) containerTipos.style.display = "block";
});

document.addEventListener("click", fecharTodosDropdowns);
containerIgrejas.addEventListener("click", (e) => { e.stopPropagation(); });
containerInstrumentos.addEventListener("click", (e) => { e.stopPropagation(); });
containerTipos.addEventListener("click", (e) => { e.stopPropagation(); });


// --- ATUALIZAÇÃO DOS TEXTOS E DISPARO DO FILTRO ---
function pegarValoresSelecionados(className) {
  const checkboxes = document.querySelectorAll(`.${className}`);
  let selecionados = [];
  checkboxes.forEach(chk => {
    if(chk.checked) { selecionados.push(chk.value); }
  });
  return selecionados;
}

containerIgrejas.addEventListener("change", () => {
  const sel = pegarValoresSelecionados("chk-igreja");
  textoFiltroIgrejas.textContent = sel.length === 0 ? "Todas las Iglesias" : (sel.length === 1 ? sel[0] : `${sel.length} Seleccionadas`);
  atualizar();
});

containerInstrumentos.addEventListener("change", () => {
  const sel = pegarValoresSelecionados("chk-instrumento");
  textoFiltroInstrumentos.textContent = sel.length === 0 ? "Todos los Instrumentos" : (sel.length === 1 ? sel[0] : `${sel.length} Selecionados`);
  atualizar();
});

containerTipos.addEventListener("change", () => {
  const sel = pegarValoresSelecionados("chk-tipo");
  textoFiltroTipos.textContent = sel.length === 0 ? "Todos los Tipos" : (sel.length === 1 ? sel[0] : `${sel.length} Seleccionados`);
  atualizar();
});


document.getElementById("btn-mais-instrumento").addEventListener("click", () => {
  instrumento2.style.display = "inline-block";
});

inputContato.addEventListener("input", function (e) {
  let value = e.target.value.replace(/\D/g, '');
  if (value.startsWith("54")) value = value.substring(2);
  if (value.startsWith("9")) value = value.substring(1);
  value = value.substring(0, 10);
  let formatted = "+54 9";
  if (value.length >= 1) formatted += " " + value.substring(0, 2);
  if (value.length >= 3) formatted += " " + value.substring(2, 6);
  if (value.length >= 7) formatted += "-" + value.substring(6, 10);
  e.target.value = formatted;
});

// Salvar / Editar Músico
document.getElementById("formMusico").addEventListener("submit", function(e){
  e.preventDefault();

  const inst1 = instrumento1.value;
  const inst2 = instrumento2.value;
  let instrumentosFinal = [inst1];

  if (instrumento2.style.display !== "none" && inst2 && inst2 !== inst1) {
    instrumentosFinal.push(inst2);
  }

  const dados = {
    igreja: igrejaSelect.value,
    nome: document.getElementById("nome").value,
    instrumento: instrumentosFinal.join(", "),
    tipo: document.getElementById("tipo").value,
    contato: inputContato.value
  };

  if (editKey === null) {
    const existe = lista.some(m => m.nome.toLowerCase() === dados.nome.toLowerCase() && m.igreja === dados.igreja);
    if (existe) {
      alert("Este músico ya se encuentra registrado en esta iglesia.");
      return;
    }
    push(ref(database, 'musicos'), dados);
  } else {
    // Al guardar o editar manualmente, sobreescribimos quitando el flag "invalid" (asumiendo corrección)
    set(ref(database, 'musicos/' + editKey), dados);
    editKey = null;
  }

  document.getElementById("formMusico").reset();
  instrumento2.style.display = "none";
});

// --- 📊 FUNÇÃO PRINCIPAL DE FILTRAGEM MULTI-SELEÇÃO ---
function atualizar(){
  const texto = busca.value.toLowerCase();
  
  const igrejasSelecionadas = pegarValoresSelecionados("chk-igreja");
  const instrumentosSelecionados = pegarValoresSelecionados("chk-instrumento");
  const tiposSelecionados = pegarValoresSelecionados("chk-tipo");

  tabela.innerHTML = "";

  filtrados = lista
  .filter(m =>
    // Filtro Múltiplo de Igrejas
    (igrejasSelecionadas.length === 0 || igrejasSelecionadas.includes(m.igreja)) &&
    
    // Filtro Múltiplo de Tipos
    (tiposSelecionados.length === 0 || tiposSelecionados.includes(m.tipo)) &&
    
    // Filtro Múltiplo de Instrumentos (verifica se possui pelo menos um dos marcados)
    (instrumentosSelecionados.length === 0 || instrumentosSelecionados.some(inst => m.instrumento.includes(inst))) &&
    
    // Campo de busca por texto livre (nome ou instrumento)
    (
      m.nome.toLowerCase().includes(texto) ||
      m.instrumento.toLowerCase().includes(texto)
    )
  )
  .sort((a, b) => a.nome.localeCompare(b.nome));

  filtrados.forEach((m)=>{
    const tr = document.createElement("tr");
    
    // Si el registro posee errores o diferencias de escritura, añade la clase CSS para marcarlo en rojo
    if (m.invalid) {
      tr.classList.add("linha-erro");
    }

    tr.innerHTML = `
      <td>${m.igreja}</td>
      <td>${m.nome}</td>
      <td>${m.instrumento}</td>
      <td>${m.tipo}</td>
      <td>${m.contato}</td>
      <td>
        <button class="btn-editar">✏️</button>
        <button class="btn-excluir">🗑️</button>
      </td>
    `;
    
    tr.querySelector(".btn-editar").addEventListener("click", () => editar(m.key));
    tr.querySelector(".btn-excluir").addEventListener("click", () => excluir(m.key));
    
    tabela.appendChild(tr);
  });

  contador.innerHTML = `<strong>Total: ${filtrados.length} músico(s)</strong>`;
}

function editar(key){
  const m = lista.find(x => x.key === key);
  if(!m) return;

  igrejaSelect.value = m.igreja;
  document.getElementById("nome").value = m.nome;
  document.getElementById("tipo").value = m.tipo;
  inputContato.value = m.contato;

  const inst = m.instrumento.split(", ");
  instrumento1.value = inst[0];

  if (inst[1]) {
    instrumento2.style.display = "inline-block";
    instrumento2.value = inst[1];
  } else {
    instrumento2.style.display = "none";
  }

  editKey = key;
}

function excluir(key){
  if(confirm("¿Realmente deseja eliminar a este músico?")) {
    remove(ref(database, 'musicos/' + key));
  }
}

// Exportar e Importar Excel
document.getElementById("btn-exportar").addEventListener("click", () => {
  if (filtrados.length === 0) {
    alert("No hay datos para exportar.");
    return;
  }

  let csvContent = "Iglesia;Nombre;Instrumento;Tipo;Contacto\n";
  filtrados.forEach(m => {
    let fila = [m.igreja, m.nome, m.instrumento, m.tipo, m.contato].join(";");
    csvContent += fila + "\n";
  });

  const blob = new Blob(["\ufeff" + csvContent], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.setAttribute("href", url);
  link.setAttribute("download", "Registro_de_Musicos_CCA.csv");
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
});

document.getElementById("btn-clique-importar").addEventListener("click", () => {
  document.getElementById("inputImportar").click();
});

document.getElementById("inputImportar").addEventListener("change", (event) => {
  const archivo = event.target.files[0];
  if (!archivo) return;

  const lector = new FileReader();
  lector.onload = function(e) {
    const contenido = e.target.result;
    const lineas = contenido.split(/\r?\n/);
    
    if (lineas.length <= 1 || lineas[0].trim() === "") {
      alert("El archivo seleccionado está vacío o no es válido.");
      return;
    }

    let registrosImportados = 0;
    let registrosDuplicados = 0;
    let registrosComErro = 0;

    for (let i = 1; i < lineas.length; i++) {
      const linea = lineas[i].trim();
      if (linea === "") continue; 

      const campos = linea.split(";");

      if (campos.length >= 5) {
        const igrejaImportar = campos[0].trim();
        const nomeImportar = campos[1].trim();
        const instrumentoImportar = campos[2].trim();
        const tipoImportar = campos[3].trim();
        const contatoImportar = campos[4].trim();

        const yaExiste = lista.some(m => 
          m.nome.toLowerCase() === nomeImportar.toLowerCase() && 
          m.igreja.toLowerCase() === igrejaImportar.toLowerCase()
        );

        if (yaExiste) {
          registrosDuplicados++;
          continue;
        }

        // VALIDACIÓN ESTRICTA: Compara contra los arrays del sistema (sensible a acentos y mayúsculas)
        const igrejaValida = igrejas.includes(igrejaImportar);
        const tipoValido = tipos.includes(tipoImportar);
        
        // Maneja si vienen múltiples instrumentos en la celda separados por coma
        const instsImportados = instrumentoImportar.split(",").map(x => x.trim());
        const instrumentosValidos = instsImportados.every(inst => instrumentos.includes(inst));

        let dados = {
          igreja: igrejaImportar,
          nome: nomeImportar,
          instrumento: instrumentoImportar,
          tipo: tipoImportar,
          contato: contatoImportar
        };

        // Si hay divergencias, le inyectamos la propiedad invalid
        if (!igrejaValida || !tipoValido || !instrumentosValidos) {
          dados.invalid = true;
          registrosComErro++;
        }

        push(ref(database, 'musicos'), dados);
        registrosImportados++;
      }
    }

    if (registrosComErro > 0) {
      alert(`Importación finalizada:\n✅ ${registrosImportados} músicos agregados.\n⚠️ ${registrosComErro} registros contienen divergencias (ej: acentos incorrectos como 'VIOLIN') y están resaltados en rojo.\n🛑 ${registrosDuplicados} registros duplicados ignorados.`);
    } else if (registrosDuplicados > 0) {
      alert(`Importación finalizada:\n✅ ${registrosImportados} novos músicos agregados.\n⚠️ ${registrosDuplicados} registros foram ignorados por estar duplicados.`);
    } else {
      alert(`¡Éxito! Se importaron ${registrosImportados} músicos correctamente.`);
    }
    event.target.value = '';
  };
  lector.readAsText(archivo, 'UTF-8');
});

// --- 🚨 FUNÇÃO PARA BORRAR TODO EL REGISTRO CON VALIDACIÓN DE CONTRASEÑA ---
document.getElementById("btn-excluir-tudo").addEventListener("click", () => {
  if (lista.length === 0) {
    alert("No hay ningún registro para eliminar.");
    return;
  }

  // Confirmación inicial preventiva
  if (!confirm("⚠️ ATENCIÓN: Esta acción eliminará por completo a TODOS los músicos del sistema. ¿Realmente desea continuar?")) {
    return;
  }

  // Solicitar contraseña para proceder
  const senhaInformada = prompt("Por seguridad, introduzca su contraseña de inicio de sesión:");
  
  if (!senhaInformada) {
    alert("Acción cancelada. La contraseña es obligatoria.");
    return;
  }

  const usuarioAtual = auth.currentUser;

  if (usuarioAtual && usuarioAtual.email) {
    // Generar la credencial de reautenticación
    const credencial = EmailAuthProvider.credential(usuarioAtual.email, senhaInformada);

    // Reautenticar al usuario para asegurar la sesión
    reauthenticateWithCredential(usuarioAtual, credencial)
      .then(() => {
        // Confirmación final tras validar la contraseña correctamente
        if (confirm("Confirmación final: ¿Eliminar la base de datos completa ahora?")) {
          remove(ref(database, 'musicos'))
            .then(() => {
              alert("💥 Todos los registros han sido eliminados con éxito de la base de datos.");
            })
            .catch((error) => {
              alert("Error al intentar limpiar la base de datos.");
              console.error(error);
            });
        }
      })
      .catch((error) => {
        alert("❌ Contraseña incorrecta o inválida. Acceso denegado para borrar los datos.");
        console.error(error);
      });
  } else {
    alert("Error de sesión: No se detectó ningún usuario activo.");
  }
});

busca.addEventListener("input", atualizar);
</script>
